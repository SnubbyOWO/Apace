name: Build and publish Docker image

on:
  push:
    branches:
      - dev
      - dev
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        platform: ${{ fromJSON(github.ref_name == 'dev' && '["linux/arm64"]' || '["linux/arm64"]') }}
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.platform }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/kotpasztet/apace:sha-${{ github.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag branch image (dev only)
        if: github.ref_name == 'dev'
        run: |
          docker buildx imagetools create -t ghcr.io/kotpasztet/apace:dev ghcr.io/kotpasztet/apace:sha-${{ github.sha }}-arm64

  merge:
    needs: build
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kotpasztet/apace
          tags: |
            type=ref,event=branch

      - name: Create and push multi-arch manifest
        run: |
          set -e
          SHA_TAG_AMD64="ghcr.io/kotpasztet/apace:sha-${{ github.sha }}-amd64"
          SHA_TAG_ARM64="ghcr.io/kotpasztet/apace:sha-${{ github.sha }}-arm64"

          for TAG in ${{ steps.meta.outputs.tags }}; do
            echo "Creating manifest for $TAG"
            docker buildx imagetools create -t $TAG $SHA_TAG_AMD64 $SHA_TAG_ARM64
          done
